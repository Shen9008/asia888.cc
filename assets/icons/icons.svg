<svg xmlns="http://www.w3.org/2000/svg" style="display: none;">
  <defs>
    <!-- Slot Machine -->
    <symbol id="icon-slot" viewBox="0 0 64 64">
      <rect x="8" y="4" width="48" height="56" rx="4" fill="none" stroke="currentColor" stroke-width="2"/>
      <circle cx="20" cy="24" r="6" fill="currentColor" opacity="0.8"/>
      <circle cx="32" cy="24" r="6" fill="currentColor" opacity="0.8"/>
      <circle cx="44" cy="24" r="6" fill="currentColor" opacity="0.8"/>
      <rect x="24" y="40" width="16" height="8" rx="2" fill="currentColor"/>
      <path d="M32 48v8" stroke="currentColor" stroke-width="2"/>
    </symbol>
    <!-- Live Casino -->
    <symbol id="icon-live" viewBox="0 0 64 64">
      <circle cx="32" cy="32" r="24" fill="none" stroke="currentColor" stroke-width="2"/>
      <circle cx="32" cy="32" r="8" fill="currentColor"/>
      <path d="M20 32c0-6.6 5.4-12 12-12" stroke="currentColor" stroke-width="2" fill="none"/>
      <path d="M44 32c0 6.6-5.4 12-12 12" stroke="currentColor" stroke-width="2" fill="none"/>
    </symbol>
    <!-- Sports -->
    <symbol id="icon-sports" viewBox="0 0 64 64">
      <ellipse cx="32" cy="36" rx="20" ry="16" fill="none" stroke="currentColor" stroke-width="2"/>
      <path d="M12 36c0-11 9-20 20-20s20 9 20 20" fill="none" stroke="currentColor" stroke-width="2"/>
      <path d="M32 20v32" stroke="currentColor" stroke-width="2"/>
    </symbol>
    <!-- Fish -->
    <symbol id="icon-fish" viewBox="0 0 64 64">
      <path d="M8 32c0 0 12-16 24-16s24 16 24 16-12 16-24 16S8 32 8 32z" fill="none" stroke="currentColor" stroke-width="2"/>
      <path d="M56 32H40" stroke="currentColor" stroke-width="2"/>
      <circle cx="20" cy="28" r="2" fill="currentColor"/>
    </symbol>
    <!-- Gift -->
    <symbol id="icon-gift" viewBox="0 0 48 48">
      <rect x="4" y="20" width="40" height="24" rx="2" fill="none" stroke="currentColor" stroke-width="2"/>
      <path d="M24 20v24" stroke="currentColor" stroke-width="2"/>
      <path d="M24 20c0-4 4-8 8-8 4 0 8 4 8 8H24z" fill="none" stroke="currentColor" stroke-width="2"/>
      <path d="M24 20c0-4-4-8-8-8-4 0-8 4-8 8h16z" fill="none" stroke="currentColor" stroke-width="2"/>
      <path d="M12 8h24" stroke="currentColor" stroke-width="2"/>
    </symbol>
    <!-- Reload -->
    <symbol id="icon-reload" viewBox="0 0 48 48">
      <path d="M8 24a16 16 0 0 1 28-10l4-4" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/>
      <path d="M40 24a16 16 0 0 1-28 10l-4 4" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/>
    </symbol>
    <!-- VIP -->
    <symbol id="icon-vip" viewBox="0 0 48 48">
      <path d="M24 4l6 12 14 2-10 10 2 14-12-6-12 6 2-14-10-10 14-2L24 4z" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
    </symbol>
    <!-- Shield -->
    <symbol id="icon-shield" viewBox="0 0 64 64">
      <path d="M32 4L8 12v20c0 16 12 24 24 28 12-4 24-12 24-28V12L32 4z" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
    </symbol>
    <!-- Visa (simplified) -->
    <symbol id="icon-visa" viewBox="0 0 64 40">
      <rect width="64" height="40" rx="4" fill="none" stroke="currentColor" stroke-width="1"/>
      <text x="32" y="26" font-size="14" font-weight="bold" fill="currentColor" text-anchor="middle">VISA</text>
    </symbol>
    <!-- Mastercard (simplified) -->
    <symbol id="icon-mastercard" viewBox="0 0 64 40">
      <rect width="64" height="40" rx="4" fill="none" stroke="currentColor" stroke-width="1"/>
      <text x="32" y="26" font-size="10" font-weight="bold" fill="currentColor" text-anchor="middle">MC</text>
    </symbol>
    <!-- Crypto -->
    <symbol id="icon-crypto" viewBox="0 0 64 40">
      <rect width="64" height="40" rx="4" fill="none" stroke="currentColor" stroke-width="1"/>
      <circle cx="32" cy="20" r="8" fill="none" stroke="currentColor" stroke-width="1"/>
      <path d="M32 12v16M26 18h12" stroke="currentColor" stroke-width="1"/>
    </symbol>
    <!-- E-wallet -->
    <symbol id="icon-ewallet" viewBox="0 0 64 40">
      <rect x="4" y="8" width="56" height="24" rx="2" fill="none" stroke="currentColor" stroke-width="1"/>
      <rect x="8" y="14" width="20" height="12" rx="1" fill="none" stroke="currentColor" stroke-width="1"/>
    </symbol>
    <!-- Menu (for header) -->
    <symbol id="icon-menu" viewBox="0 0 24 24">
      <path d="M3 6h18M3 12h18M3 18h18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
    </symbol>
    <!-- Close -->
    <symbol id="icon-close" viewBox="0 0 24 24">
      <path d="M18 6L6 18M6 6l12 12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
    </symbol>
  </defs>
</svg>
